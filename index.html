<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>听风的 3D 钢筋世界</title>
    <style>
        /* 这里是控制 UI（长相）的 CSS 魔法区 */
        body {
            font-family: '微软雅黑', sans-serif;
            background-color: #f0f8ff; /* 这是浅蓝色背景 */
            text-align: center;
            padding-top: 100px;
            color: #333;
        }
        .container {
            background: white; /* 白色卡片 */
            padding: 50px;
            border-radius: 20px; /* 圆角 */
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); /* 阴影效果 */
            display: inline-block;
        }
        h1 { color: #0056b3; } /* 标题变成深蓝色 */
        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 30px;
            background-color: #28a745; /* 绿色按钮 */
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 20px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover {
            background-color: #218838; /* 鼠标放上去变深绿色 */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👋 欢迎来到听风的 3D 钢筋可视化平台</h1>
        <p>这是我亲手打造的第一个工程可视化网站！</p>
        
        <a href="./beam" class="btn">👉 点击进入 3D 钢筋演示系统</a>
    </div>
</body>
</html>
